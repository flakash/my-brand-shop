<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>আমার ব্র্যান্ড শপ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛍️ আমার ব্র্যান্ড</h1>
    <p>সেরা মানের পণ্য, সরাসরি আপনার দরজায়</p>
  </header>

  <main>
    <h2>আমাদের পণ্যসমূহ</h2>
    <div id="products-grid" class="products-grid">
      <!-- পণ্যগুলো এখানে লোড হবে -->
      <p>লোড হচ্ছে...</p>
    </div>
  </main>

  <footer>
    <p>© 2025 আমার ব্র্যান্ড। সব অধিকার সংরক্ষিত।</p>
  </footer>

  <script>
    // GitHub থেকে পণ্যের ডেটা লোড করা হচ্ছে
    async function loadProducts() {
      try {
        // _products ফোল্ডার থেকে পণ্য লোড করা হবে
        // Netlify এই JSON ফাইলগুলো সার্ভ করবে
        const response = await fetch('/_products/products.json');
        
        if (!response.ok) {
          document.getElementById('products-grid').innerHTML = 
            '<p>কোনো পণ্য পাওয়া যায়নি। অ্যাডমিন প্যানেল থেকে পণ্য যোগ করুন।</p>';
          return;
        }

        const products = await response.json();
        displayProducts(products);
      } catch (error) {
        document.getElementById('products-grid').innerHTML = 
          '<p>পণ্য লোড করতে সমস্যা হয়েছে।</p>';
      }
    }

    function displayProducts(products) {
      const grid = document.getElementById('products-grid');
      
      if (!products || products.length === 0) {
        grid.innerHTML = '<p>এখনো কোনো পণ্য যোগ করা হয়নি।</p>';
        return;
      }

      const publishedProducts = products.filter(p => p.published !== false);
      
      grid.innerHTML = publishedProducts.map(product => `
        <div class="product-card">
          ${product.image 
            ? `<img src="${product.image}" alt="${product.title}" class="product-image">` 
            : `<div class="product-placeholder">📦</div>`
          }
          <div class="product-info">
            <span class="product-category">${product.category || 'অন্যান্য'}</span>
            <h3 class="product-title">${product.title}</h3>
            <p class="product-description">${product.description || ''}</p>
            <div class="product-footer">
              <span class="product-price">৳ ${product.price?.toLocaleString('bn-BD')}</span>
              <span class="product-stock ${product.stock > 0 ? 'in-stock' : 'out-of-stock'}">
                ${product.stock > 0 ? `স্টক: ${product.stock}` : 'স্টক নেই'}
              </span>
            </div>
            <button 
              class="add-to-cart" 
              ${product.stock === 0 ? 'disabled' : ''}
              onclick="addToCart('${product.title}', ${product.price})"
            >
              ${product.stock > 0 ? 'কার্টে যোগ করুন' : 'স্টক শেষ'}
            </button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(name, price) {
      alert(`✅ "${name}" কার্টে যোগ হয়েছে!\nদাম: ৳${price}`);
      // পরে এখানে আসল কার্ট ফাংশন যোগ করবেন
    }

    // পেজ লোড হলে পণ্য দেখাও
    loadProducts();
  </script>

</body>
</html>
